<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <title>Garud — Grosint</title>

  <!-- Outer orbit ring -->
  <circle cx="50" cy="50" r="47" stroke="#B86810" stroke-width="0.8" opacity="0.6"
    class="orbit-outer"/>

  <!-- Mid ring -->
  <circle cx="50" cy="50" r="40" stroke="#E87D14" stroke-width="0.5" opacity="0.35"
    stroke-dasharray="3 6"/>

  <!-- Inner focus ring -->
  <circle cx="50" cy="50" r="33" stroke="#E87D14" stroke-width="1"
    class="orbit-inner"/>

  <!-- Cardinal dots on outer ring — N / E / S / W -->
  <circle cx="50"  cy="3"  r="2" fill="#D4956A"/>
  <circle cx="97"  cy="50" r="2" fill="#D4956A"/>
  <circle cx="50"  cy="97" r="2" fill="#D4956A"/>
  <circle cx="3"   cy="50" r="2" fill="#D4956A"/>

  <!-- Eagle body — geometric polygon (Garud, wings spread) -->
  <!-- Head -->
  <ellipse cx="50" cy="26" rx="5" ry="6" fill="#F5A623"/>

  <!-- Beak -->
  <polygon points="53,30 57,34 50,32" fill="#B86810"/>

  <!-- Eye -->
  <circle cx="52" cy="25" r="1.5" fill="#000"/>
  <circle cx="52.5" cy="24.5" r="0.5" fill="#fff"/>

  <!-- Neck / upper body -->
  <polygon points="45,30 55,30 58,42 50,40 42,42" fill="#F5A623"/>

  <!-- Lower body / tail -->
  <polygon points="42,42 58,42 56,62 50,65 44,62" fill="#E87D14"/>

  <!-- Tail feathers -->
  <polygon points="44,62 50,65 46,76 40,70" fill="#B86810" opacity="0.9"/>
  <polygon points="50,65 56,62 60,70 54,76" fill="#B86810" opacity="0.9"/>
  <polygon points="47,65 53,65 51,78 49,78" fill="#F5A623" opacity="0.8"/>

  <!-- Left wing — spread wide -->
  <polygon points="45,34 12,24 8,38 20,44 42,42" fill="#E87D14"/>
  <polygon points="12,24 4,32 8,38 14,30"         fill="#B86810"/>
  <!-- Left primary feathers -->
  <polygon points="20,44  8,38  6,46 18,52"  fill="#C47A0B" opacity="0.85"/>
  <polygon points="30,46 18,52  16,60 28,54" fill="#B86810" opacity="0.8"/>
  <polygon points="42,42 30,46 28,54 40,50"  fill="#E87D14" opacity="0.9"/>

  <!-- Right wing — spread wide -->
  <polygon points="55,34 88,24 92,38 80,44 58,42" fill="#E87D14"/>
  <polygon points="88,24 96,32 92,38 86,30"        fill="#B86810"/>
  <!-- Right primary feathers -->
  <polygon points="80,44 92,38 94,46 82,52"  fill="#C47A0B" opacity="0.85"/>
  <polygon points="70,46 82,52 84,60 72,54"  fill="#B86810" opacity="0.8"/>
  <polygon points="58,42 70,46 72,54 60,50"  fill="#E87D14" opacity="0.9"/>

  <!-- Talons — left -->
  <polygon points="45,62 42,72 40,74 44,70 46,72" fill="#B86810"/>
  <!-- Talons — right -->
  <polygon points="55,62 58,72 60,74 56,70 54,72" fill="#B86810"/>

  <!-- Centre focal dot -->
  <circle cx="50" cy="50" r="3" fill="#F5A623"/>
  <circle cx="50" cy="50" r="1.5" fill="#fff" opacity="0.6"/>

  <style>
    .orbit-inner {
      transform-origin: 50px 50px;
      animation: orbit-breathe 5s ease-in-out infinite;
    }
    @keyframes orbit-breathe {
      0%, 100% { transform: scale(1);    opacity: 0.5; }
      50%       { transform: scale(1.06); opacity: 1; }
    }
  </style>
</svg>
